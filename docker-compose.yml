services:
  # ── MySQL Database ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: fittracker-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fittracker_root}
      MYSQL_DATABASE: ${DB_NAME:-fittracker_db}
      MYSQL_USER: ${DB_USER:-fittracker}
      MYSQL_PASSWORD: ${DB_PASSWORD:-fittracker_pass}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-fittracker_root}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fittracker-net

  # ── Flask Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fittracker-backend
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: mysql://${DB_USER:-fittracker}:${DB_PASSWORD:-fittracker_pass}@db:3306/${DB_NAME:-fittracker_db}
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - fittracker-net

  # ── React Frontend (Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fittracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - fittracker-net

volumes:
  mysql_data:
    driver: local

networks:
  fittracker-net:
    driver: bridge
